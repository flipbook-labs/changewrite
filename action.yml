name: Changewrite Release
description: Create release PRs, draft/publish GitHub releases, and expose release state for downstream jobs.
author: flipbook-labs

inputs:
  rokit-version:
    description: Version of Rokit to install.
    required: false
    default: v1.2.0
  github-token:
    description: Token used for GitHub API calls (release creation, publishing). Defaults to the built-in GITHUB_TOKEN.
    required: false
    default: ${{ github.token }}
  pr-token:
    description: >-
      Token used to create the publish PR. Pass a GitHub App installation token or a PAT
      if the resulting PR should trigger workflow runs; PRs created with GITHUB_TOKEN do not
      trigger other workflows.
    required: false
    default: ""
  bump:
    description: Which semver component to bump when preparing the next release PR (major, minor, patch).
    required: false
    default: minor
  publish-immediately:
    description: Publish the drafted GitHub release immediately. Set false when downstream jobs attach artifacts first.
    required: false
    default: "true"
  force-publish:
    description: Tag and draft the configured version even if it already has a tag.
    required: false
    default: "false"
  version-bump:
    description: >-
      Open a publish PR that bumps this semver component (major, minor, or
      patch), regardless of release state. Use it to step past a version whose
      tag can never be published -- e.g. one GitHub reserved after its immutable
      release was deleted. The run skips drafting and publishing when set.
    required: false
    default: ""
  force-version:
    description: >-
      Open a publish PR that sets this exact version (e.g. 1.2.3). Like
      `version-bump`, but pins the version instead of stepping a component; wins
      when both are set.
    required: false
    default: ""
  base:
    description: Base branch for the generated publish PR.
    required: false
    default: main
  branch:
    description: Branch name for the generated publish PR.
    required: false
    default: publish-next-version
  pr-title:
    description: Title for the generated publish PR.
    required: false
    default: Publish v{{version}}
  pr-body:
    description: Body for the generated publish PR.
    required: false
    default: |
      >[!IMPORTANT]
      > This PR prepares the next release by bumping the version and updating the changelog.
      >
      > **Merging this PR will:**
      >
      > 1. Create tag `{{tag}}` via the GitHub API
      > 2. Create a GitHub release for that tag
      > 3. Publish the release after any configured follow-up jobs finish

      <details>
      <summary><b>GitHub Release preview</b></summary>

      # {{tag}}

      **github-actions** released this 0 seconds ago 🔒 Immutable 🏷️ {{tag}} 🔗 SHA

      {{notes}}
      </details>

      Next release will be available here:
      {{repo_url}}/releases/tag/{{tag}}

      🤖 This PR was generated by [this run]({{run_url}}).
  prepare-only:
    description: Prepare the publish PR without drafting or publishing a release.
    required: false
    default: "false"
  post-draft-hook:
    description: >-
      Bash run after the draft release is created, before it is published. Use it
      to attach build artifacts so they ship with the release without a separate
      job. Receives CHANGEWRITE_VERSION, CHANGEWRITE_TAG, CHANGEWRITE_BIN, and
      GH_TOKEN in the environment. Security: this value is spliced into a shell
      script, so it must be a static literal. Never interpolate untrusted
      GitHub Actions expressions (e.g. event titles, branch names) into it;
      read such values from the environment inside the hook instead.
    required: false
    default: ""
  post-publish-hook:
    description: >-
      Bash run after the GitHub release is published. Use it to announce the
      release, push to a registry, or trigger downstream work. Receives
      CHANGEWRITE_VERSION, CHANGEWRITE_TAG, CHANGEWRITE_BIN, and GH_TOKEN in the
      environment. Security: this value is spliced into a shell script, so it
      must be a static literal. Never interpolate untrusted GitHub Actions
      expressions (e.g. event titles, branch names) into it; read such values
      from the environment inside the hook instead.
    required: false
    default: ""

outputs:
  should_publish:
    description: Whether this run drafted a release for the configured version.
    value: ${{ steps.result.outputs.should_publish }}
  has_changes:
    description: Whether there are unreleased commits since the current version tag.
    value: ${{ steps.result.outputs.has_changes }}
  version:
    description: The release version acted on by this run.
    value: ${{ steps.result.outputs.version }}
  tag:
    description: The release tag for the version output.
    value: ${{ steps.result.outputs.tag }}
  draft_created:
    description: Whether a draft release was created or confirmed.
    value: ${{ steps.result.outputs.draft_created }}
  release_created:
    description: Whether a GitHub release was published.
    value: ${{ steps.result.outputs.release_created }}

runs:
  using: composite
  steps:
    - name: Install Rokit
      uses: CompeyDev/setup-rokit@v0.2.1
      with:
        version: ${{ inputs.rokit-version }}
        token: ${{ inputs.github-token }}
        path: ${{ github.action_path }}

    - name: Build changewrite CLI
      shell: bash
      run: |
        set -euo pipefail
        cd "$GITHUB_ACTION_PATH"
        lute run install
        lute run build

    - name: Evaluate release gate
      id: gate
      shell: bash
      env:
        FORCE_PUBLISH: ${{ inputs.force-publish }}
      run: |
        set -euo pipefail

        args=(gate)
        if [[ "$FORCE_PUBLISH" == "true" ]]; then
          args+=(--force-publish)
        fi

        result="$("$GITHUB_ACTION_PATH/build/changewrite" "${args[@]}")"
        echo "$result"

        echo "version=$(jq -r '.version' <<< "$result")" >> "$GITHUB_OUTPUT"
        echo "should_publish=$(jq -r '.should_publish' <<< "$result")" >> "$GITHUB_OUTPUT"
        echo "has_changes=$(jq -r '.has_changes' <<< "$result")" >> "$GITHUB_OUTPUT"

    - name: Draft release
      id: draft
      if: steps.gate.outputs.should_publish == 'true' && inputs.prepare-only != 'true' && inputs.version-bump == '' && inputs.force-version == ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        "$GITHUB_ACTION_PATH/build/changewrite" draft --version "${{ steps.gate.outputs.version }}"
        echo "draft_created=true" >> "$GITHUB_OUTPUT"

    - name: Run post-draft hook
      if: steps.draft.outputs.draft_created == 'true' && inputs.post-draft-hook != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        CHANGEWRITE_VERSION: ${{ steps.gate.outputs.version }}
        CHANGEWRITE_TAG: v${{ steps.gate.outputs.version }}
        CHANGEWRITE_BIN: ${{ github.action_path }}/build/changewrite
      run: ${{ inputs.post-draft-hook }}

    - name: Publish release
      id: publish
      if: steps.gate.outputs.should_publish == 'true' && inputs.publish-immediately == 'true' && inputs.prepare-only != 'true' && inputs.version-bump == '' && inputs.force-version == ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        "$GITHUB_ACTION_PATH/build/changewrite" publish --tag "v${{ steps.gate.outputs.version }}"
        echo "release_created=true" >> "$GITHUB_OUTPUT"

    - name: Run post-publish hook
      if: steps.publish.outputs.release_created == 'true' && inputs.post-publish-hook != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        CHANGEWRITE_VERSION: ${{ steps.gate.outputs.version }}
        CHANGEWRITE_TAG: v${{ steps.gate.outputs.version }}
        CHANGEWRITE_BIN: ${{ github.action_path }}/build/changewrite
      run: ${{ inputs.post-publish-hook }}

    - name: Prepare release changes
      id: prepare
      if: inputs.version-bump == '' && inputs.force-version == '' && (inputs.prepare-only == 'true' || (steps.gate.outputs.should_publish != 'true' && steps.gate.outputs.has_changes == 'true'))
      shell: bash
      env:
        BUMP: ${{ inputs.bump }}
      run: |
        set -euo pipefail
        result="$("$GITHUB_ACTION_PATH/build/changewrite" prepare-pr --bump "$BUMP")"
        echo "$result"
        json="$(tail -n1 <<< "$result")"

        echo "version=$(jq -r '.version' <<< "$json")" >> "$GITHUB_OUTPUT"
        {
          echo 'changed_files<<__CHANGEWRITE_FILES__'
          echo 'CHANGELOG.md'
          jq -r '.changed_files[]' <<< "$json"
          echo '__CHANGEWRITE_FILES__'
        } >> "$GITHUB_OUTPUT"

    - name: Bump past an unpublishable version
      id: bump
      if: inputs.version-bump != '' || inputs.force-version != ''
      shell: bash
      env:
        # An exact version wins over a component bump when both are set.
        BUMP_TARGET: ${{ inputs.force-version != '' && inputs.force-version || inputs.version-bump }}
      run: |
        set -euo pipefail
        result="$("$GITHUB_ACTION_PATH/build/changewrite" bump "$BUMP_TARGET")"
        echo "$result"
        json="$(tail -n1 <<< "$result")"

        echo "version=$(jq -r '.version' <<< "$json")" >> "$GITHUB_OUTPUT"
        {
          echo 'changed_files<<__CHANGEWRITE_FILES__'
          echo 'CHANGELOG.md'
          jq -r '.changed_files[]' <<< "$json"
          echo '__CHANGEWRITE_FILES__'
        } >> "$GITHUB_OUTPUT"

    - name: Render release notes preview
      id: notes
      if: steps.prepare.outputs.version != '' || steps.bump.outputs.version != ''
      shell: bash
      run: |
        set -euo pipefail
        {
          echo 'body<<__CHANGEWRITE_NOTES__'
          "$GITHUB_ACTION_PATH/build/changewrite" notes --version "${{ steps.prepare.outputs.version || steps.bump.outputs.version }}"
          echo '__CHANGEWRITE_NOTES__'
        } >> "$GITHUB_OUTPUT"

    - name: Render publish PR text
      id: pr
      if: steps.prepare.outputs.version != '' || steps.bump.outputs.version != ''
      shell: bash
      env:
        PR_TITLE_TEMPLATE: ${{ inputs.pr-title }}
        PR_BODY_TEMPLATE: ${{ inputs.pr-body }}
        VERSION: ${{ steps.prepare.outputs.version || steps.bump.outputs.version }}
        TAG: v${{ steps.prepare.outputs.version || steps.bump.outputs.version }}
        NOTES: ${{ steps.notes.outputs.body }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        REPO_URL: ${{ github.server_url }}/${{ github.repository }}
      run: |
        set -euo pipefail

        render_template() {
          local text="$1"
          text="${text//\{\{version\}\}/$VERSION}"
          text="${text//\{\{tag\}\}/$TAG}"
          text="${text//\{\{notes\}\}/$NOTES}"
          text="${text//\{\{run_url\}\}/$RUN_URL}"
          text="${text//\{\{repo_url\}\}/$REPO_URL}"
          printf '%s' "$text"
        }

        title="$(render_template "$PR_TITLE_TEMPLATE")"
        body="$(render_template "$PR_BODY_TEMPLATE")"

        {
          echo 'title<<__CHANGEWRITE_PR_TITLE__'
          printf '%s\n' "$title"
          echo '__CHANGEWRITE_PR_TITLE__'
          echo 'body<<__CHANGEWRITE_PR_BODY__'
          printf '%s\n' "$body"
          echo '__CHANGEWRITE_PR_BODY__'
        } >> "$GITHUB_OUTPUT"

    - name: Create or update publish PR
      if: steps.prepare.outputs.version != '' || steps.bump.outputs.version != ''
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ inputs.pr-token || inputs.github-token }}
        base: ${{ inputs.base }}
        branch: ${{ inputs.branch }}
        draft: true
        commit-message: Publish v${{ steps.prepare.outputs.version || steps.bump.outputs.version }}
        title: ${{ steps.pr.outputs.title }}
        add-paths: |
          ${{ steps.prepare.outputs.changed_files || steps.bump.outputs.changed_files }}
        body: ${{ steps.pr.outputs.body }}

    - name: Set action outputs
      id: result
      shell: bash
      run: |
        set -euo pipefail

        version="${{ steps.prepare.outputs.version || steps.bump.outputs.version || steps.gate.outputs.version }}"

        echo "should_publish=${{ steps.gate.outputs.should_publish }}" >> "$GITHUB_OUTPUT"
        echo "has_changes=${{ steps.gate.outputs.has_changes }}" >> "$GITHUB_OUTPUT"
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "tag=v$version" >> "$GITHUB_OUTPUT"
        echo "draft_created=${{ steps.draft.outputs.draft_created || 'false' }}" >> "$GITHUB_OUTPUT"
        echo "release_created=${{ steps.publish.outputs.release_created || 'false' }}" >> "$GITHUB_OUTPUT"
