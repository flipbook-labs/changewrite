name: Changewrite Release
description: Create release PRs, draft/publish GitHub releases, and expose release state for downstream jobs.
author: flipbook-labs

inputs:
  github-token:
    description: Token used for GitHub API calls (release creation, publishing). Defaults to the built-in GITHUB_TOKEN.
    required: false
    default: ${{ github.token }}
  pr-token:
    description: >-
      Token used to create the publish PR. Pass a GitHub App installation token or a PAT
      if the resulting PR should trigger workflow runs; PRs created with GITHUB_TOKEN do not
      trigger other workflows.
    required: false
    default: ""
  publish-immediately:
    description: Publish the drafted GitHub release immediately. Set false when downstream jobs attach artifacts first.
    required: false
    default: "true"
  force-publish:
    description: Tag and draft the configured version even if it already has a tag.
    required: false
    default: "false"
  force-version:
    description: >-
      Open a publish PR that sets this exact version (e.g. 1.2.3), regardless of
      release state. Use it to forget the version currently being published and
      release this one instead, for example to step past a tag that can never be
      published or to redo a release at a different version. The run skips
      drafting and publishing when set.
    required: false
    default: ""
  base:
    description: Base branch for the generated publish PR.
    required: false
    default: main
  branch:
    description: Branch name for the generated publish PR.
    required: false
    default: publish-next-version
  pr-title:
    description: Title for the generated publish PR.
    required: false
    default: Publish v{{version}}
  pr-body:
    description: Body for the generated publish PR.
    required: false
    default: |
      >[!IMPORTANT]
      > This PR prepares the next release by bumping the version and updating the changelog.
      >
      > **Merging this PR will:**
      >
      > 1. Create tag `{{tag}}` via the GitHub API
      > 2. Create a GitHub release for that tag
      > 3. Publish the release after any configured follow-up jobs finish

      <details>
      <summary><b>GitHub Release preview</b></summary>

      # {{tag}}

      **github-actions** released this 0 seconds ago 🔒 Immutable 🏷️ {{tag}} 🔗 SHA

      {{notes}}
      </details>

      Next release will be available here:
      {{repo_url}}/releases/tag/{{tag}}

      🤖 This PR was generated by [this run]({{run_url}}).
  prepare-only:
    description: Prepare the publish PR without drafting or publishing a release.
    required: false
    default: "false"
  require-entry:
    description: >-
      Require the current branch to add its own changelog entry before merging.
      Needs a full-history checkout (actions/checkout with fetch-depth: 0) so the
      check can compare against the base branch. When enabled, the action runs
      only this check and skips the release flow.
    required: false
    default: "false"
  merge-lock:
    description: >-
      Guard the publish PR with a `publish-lock` commit status while a release
      run regenerates it, so it cannot be merged out of date. On a push the run
      fails the status up front and clears it once the PR is refreshed, leaving
      it locked if the run fails. On a pull request that is not the publish
      branch the status is reported satisfied, so requiring it does not block
      ordinary PRs. Make `publish-lock` a required status check on the base
      branch for this to block a merge, and grant the job `statuses: write`. Set
      false to disable.
    required: false
    default: "true"
  post-draft-hook:
    description: >-
      Bash run after the draft release is created, before it is published. Use it
      to attach build artifacts so they ship with the release without a separate
      job. Receives CHANGEWRITE_VERSION, CHANGEWRITE_TAG, CHANGEWRITE_BIN, and
      GH_TOKEN in the environment. Security: this value is spliced into a shell
      script, so it must be a static literal. Never interpolate untrusted
      GitHub Actions expressions (e.g. event titles, branch names) into it;
      read such values from the environment inside the hook instead.
    required: false
    default: ""
  post-publish-hook:
    description: >-
      Bash run after the GitHub release is published. Use it to announce the
      release, push to a registry, or trigger downstream work. Receives
      CHANGEWRITE_VERSION, CHANGEWRITE_TAG, CHANGEWRITE_BIN, and GH_TOKEN in the
      environment. Security: this value is spliced into a shell script, so it
      must be a static literal. Never interpolate untrusted GitHub Actions
      expressions (e.g. event titles, branch names) into it; read such values
      from the environment inside the hook instead.
    required: false
    default: ""

outputs:
  should_publish:
    description: Whether this run drafted a release for the configured version.
    value: ${{ steps.result.outputs.should_publish }}
  has_changes:
    description: Whether there are pending unreleased changes to assemble into the next release.
    value: ${{ steps.result.outputs.has_changes }}
  version:
    description: The release version acted on by this run.
    value: ${{ steps.result.outputs.version }}
  tag:
    description: The release tag for the version output.
    value: ${{ steps.result.outputs.tag }}
  draft_created:
    description: Whether a draft release was created or confirmed.
    value: ${{ steps.result.outputs.draft_created }}
  release_created:
    description: Whether a GitHub release was published.
    value: ${{ steps.result.outputs.release_created }}

runs:
  using: composite
  steps:
    - name: Download changewrite binary
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        # A caller can pre-set CHANGEWRITE_BIN to run its own binary rather than a
        # release download. Changewrite's own CI uses this to dogfood the branch
        # build; consumers leave it unset and get the release below.
        if [[ -n "${CHANGEWRITE_BIN:-}" ]]; then
          echo "Using preset changewrite binary: $CHANGEWRITE_BIN"
          exit 0
        fi

        version="$(sed -n 's/^current = "\(.*\)"/\1/p' "$GITHUB_ACTION_PATH/changewrite.toml")"
        if [[ -z "$version" ]]; then
          echo "Failed to parse version from changewrite.toml"
          exit 1
        fi

        case "${RUNNER_OS}/${RUNNER_ARCH}" in
          Linux/X64)   zip="changewrite-linux-x86_64.zip"  ; bin="changewrite" ;;
          macOS/ARM64) zip="changewrite-macos-arm64.zip"   ; bin="changewrite" ;;
          Windows/X64) zip="changewrite-windows-x86_64.zip"; bin="changewrite.exe" ;;
          *) echo "Unsupported platform: ${RUNNER_OS}/${RUNNER_ARCH}"; exit 1 ;;
        esac

        tmp="$(mktemp -d)"
        if ! gh release download "v${version}" \
          --repo flipbook-labs/changewrite \
          --pattern "$zip" \
          --dir "$tmp"; then
          echo "::warning::Could not download the binary for v${version}; falling back to the latest release. This is expected on the publish PR, which bumps the version before its release exists. Otherwise, check that the version in changewrite.toml has a published release."
          gh release download \
            --repo flipbook-labs/changewrite \
            --pattern "$zip" \
            --dir "$tmp"
        fi

        unzip -q "$tmp/$zip" "$bin" -d "$tmp"
        [[ "$RUNNER_OS" != "Windows" ]] && chmod +x "$tmp/$bin"

        echo "CHANGEWRITE_BIN=$tmp/$bin" >> "$GITHUB_ENV"

    - name: Lock the publish PR
      # A push to the base branch starts this run, which regenerates the publish
      # PR. Fail its lock now so it cannot be merged out of date in the window
      # before the refresh lands; the final step clears it once the run succeeds.
      if: inputs.merge-lock == 'true' && github.event_name == 'push'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        BRANCH: ${{ inputs.branch }}
        REPO: ${{ github.repository }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        set -euo pipefail
        "$CHANGEWRITE_BIN" lock --state failure --branch "$BRANCH" --repo "$REPO" --url "$RUN_URL"

    - name: Report the publish lock satisfied
      # Every PR into the base branch must report `publish-lock` or a required
      # check would wait on it forever. This PR is not the publish PR, so mark it
      # satisfied at once. A few-second no-op that runs alongside the real CI.
      if: inputs.merge-lock == 'true' && github.event_name == 'pull_request' && github.head_ref != inputs.branch
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        set -euo pipefail
        "$CHANGEWRITE_BIN" lock --state success --sha "$HEAD_SHA" --repo "$REPO" --url "$RUN_URL"

    - name: Require an unreleased change entry
      if: inputs.require-entry == 'true' && github.head_ref != inputs.branch
      shell: bash
      env:
        BASE_REF: ${{ github.base_ref }}
      run: |
        set -euo pipefail

        # github.base_ref names the PR base branch but isn't fetched by default,
        # so fetch it and pass it to check. Non-PR runs leave it empty, where the
        # CLI falls back to the remote's default branch.
        if [[ -n "${BASE_REF:-}" ]]; then
          git fetch --no-tags origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
          "$CHANGEWRITE_BIN" check --base "origin/${BASE_REF}"
        else
          "$CHANGEWRITE_BIN" check
        fi

    - name: Evaluate release gate
      id: gate
      if: inputs.require-entry != 'true'
      shell: bash
      env:
        FORCE_PUBLISH: ${{ inputs.force-publish }}
      run: |
        set -euo pipefail

        args=(gate)
        if [[ "$FORCE_PUBLISH" == "true" ]]; then
          args+=(--force-publish)
        fi

        result="$("$CHANGEWRITE_BIN" "${args[@]}")"
        echo "$result"

        echo "version=$(jq -r '.version' <<< "$result")" >> "$GITHUB_OUTPUT"
        echo "should_publish=$(jq -r '.should_publish' <<< "$result")" >> "$GITHUB_OUTPUT"
        echo "has_changes=$(jq -r '.has_changes' <<< "$result")" >> "$GITHUB_OUTPUT"

    - name: Draft release
      id: draft
      if: steps.gate.outputs.should_publish == 'true' && inputs.prepare-only != 'true' && inputs.force-version == ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        "$CHANGEWRITE_BIN" draft --version "${{ steps.gate.outputs.version }}"
        echo "draft_created=true" >> "$GITHUB_OUTPUT"

    - name: Run post-draft hook
      if: steps.draft.outputs.draft_created == 'true' && inputs.post-draft-hook != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        CHANGEWRITE_VERSION: ${{ steps.gate.outputs.version }}
        CHANGEWRITE_TAG: v${{ steps.gate.outputs.version }}
      run: ${{ inputs.post-draft-hook }}

    - name: Publish release
      id: publish
      if: steps.gate.outputs.should_publish == 'true' && inputs.publish-immediately == 'true' && inputs.prepare-only != 'true' && inputs.force-version == ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        "$CHANGEWRITE_BIN" publish --tag "v${{ steps.gate.outputs.version }}"
        echo "release_created=true" >> "$GITHUB_OUTPUT"

    - name: Run post-publish hook
      if: steps.publish.outputs.release_created == 'true' && inputs.post-publish-hook != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        CHANGEWRITE_VERSION: ${{ steps.gate.outputs.version }}
        CHANGEWRITE_TAG: v${{ steps.gate.outputs.version }}
      run: ${{ inputs.post-publish-hook }}

    - name: Prepare release changes
      id: prepare
      if: inputs.require-entry != 'true' && inputs.force-version == '' && (inputs.prepare-only == 'true' || (steps.gate.outputs.should_publish != 'true' && steps.gate.outputs.has_changes == 'true'))
      shell: bash
      run: |
        set -euo pipefail
        result="$("$CHANGEWRITE_BIN" prepare-pr)"
        echo "$result"
        json="$(tail -n1 <<< "$result")"

        echo "version=$(jq -r '.version' <<< "$json")" >> "$GITHUB_OUTPUT"
        {
          echo 'changed_files<<__CHANGEWRITE_FILES__'
          jq -r '.changed_files[]' <<< "$json"
          echo '__CHANGEWRITE_FILES__'
        } >> "$GITHUB_OUTPUT"

    - name: Bump to the forced version
      id: bump
      if: inputs.force-version != '' && inputs.require-entry != 'true'
      shell: bash
      env:
        FORCE_VERSION: ${{ inputs.force-version }}
      run: |
        set -euo pipefail
        result="$("$CHANGEWRITE_BIN" bump "$FORCE_VERSION")"
        echo "$result"
        json="$(tail -n1 <<< "$result")"

        echo "version=$(jq -r '.version' <<< "$json")" >> "$GITHUB_OUTPUT"
        {
          echo 'changed_files<<__CHANGEWRITE_FILES__'
          jq -r '.changed_files[]' <<< "$json"
          echo '__CHANGEWRITE_FILES__'
        } >> "$GITHUB_OUTPUT"

    - name: Render release notes preview
      id: notes
      if: steps.prepare.outputs.version != '' || steps.bump.outputs.version != ''
      shell: bash
      run: |
        set -euo pipefail
        {
          echo 'body<<__CHANGEWRITE_NOTES__'
          "$CHANGEWRITE_BIN" notes --version "${{ steps.prepare.outputs.version || steps.bump.outputs.version }}"
          echo '__CHANGEWRITE_NOTES__'
        } >> "$GITHUB_OUTPUT"

    - name: Render publish PR text
      id: pr
      if: steps.prepare.outputs.version != '' || steps.bump.outputs.version != ''
      shell: bash
      env:
        PR_TITLE_TEMPLATE: ${{ inputs.pr-title }}
        PR_BODY_TEMPLATE: ${{ inputs.pr-body }}
        VERSION: ${{ steps.prepare.outputs.version || steps.bump.outputs.version }}
        TAG: v${{ steps.prepare.outputs.version || steps.bump.outputs.version }}
        NOTES: ${{ steps.notes.outputs.body }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        REPO_URL: ${{ github.server_url }}/${{ github.repository }}
      run: |
        set -euo pipefail

        render_template() {
          local text="$1"
          text="${text//\{\{version\}\}/$VERSION}"
          text="${text//\{\{tag\}\}/$TAG}"
          text="${text//\{\{notes\}\}/$NOTES}"
          text="${text//\{\{run_url\}\}/$RUN_URL}"
          text="${text//\{\{repo_url\}\}/$REPO_URL}"
          printf '%s' "$text"
        }

        title="$(render_template "$PR_TITLE_TEMPLATE")"
        body="$(render_template "$PR_BODY_TEMPLATE")"

        {
          echo 'title<<__CHANGEWRITE_PR_TITLE__'
          printf '%s\n' "$title"
          echo '__CHANGEWRITE_PR_TITLE__'
          echo 'body<<__CHANGEWRITE_PR_BODY__'
          printf '%s\n' "$body"
          echo '__CHANGEWRITE_PR_BODY__'
        } >> "$GITHUB_OUTPUT"

    - name: Create or update publish PR
      if: steps.prepare.outputs.version != '' || steps.bump.outputs.version != ''
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ inputs.pr-token || inputs.github-token }}
        base: ${{ inputs.base }}
        branch: ${{ inputs.branch }}
        draft: false
        commit-message: Publish v${{ steps.prepare.outputs.version || steps.bump.outputs.version }}
        title: ${{ steps.pr.outputs.title }}
        add-paths: |
          ${{ steps.prepare.outputs.changed_files || steps.bump.outputs.changed_files }}
        body: ${{ steps.pr.outputs.body }}

    - name: Set action outputs
      id: result
      shell: bash
      run: |
        set -euo pipefail

        version="${{ steps.prepare.outputs.version || steps.bump.outputs.version || steps.gate.outputs.version }}"

        echo "should_publish=${{ steps.gate.outputs.should_publish }}" >> "$GITHUB_OUTPUT"
        echo "has_changes=${{ steps.gate.outputs.has_changes }}" >> "$GITHUB_OUTPUT"
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "tag=v$version" >> "$GITHUB_OUTPUT"
        echo "draft_created=${{ steps.draft.outputs.draft_created || 'false' }}" >> "$GITHUB_OUTPUT"
        echo "release_created=${{ steps.publish.outputs.release_created || 'false' }}" >> "$GITHUB_OUTPUT"

    - name: Unlock the publish PR
      # Runs last, so it is reached only when every step above succeeded. The
      # regenerated PR now matches the base branch, so clear its lock. A failed
      # run skips this step, leaving the PR locked.
      if: inputs.merge-lock == 'true' && github.event_name == 'push'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        BRANCH: ${{ inputs.branch }}
        REPO: ${{ github.repository }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        set -euo pipefail
        "$CHANGEWRITE_BIN" lock --state success --branch "$BRANCH" --repo "$REPO" --url "$RUN_URL"
