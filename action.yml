name: Changewrite Release
description: Create release PRs, draft/publish GitHub releases, and expose release state for downstream jobs.
author: flipbook-labs

inputs:
  rokit-version:
    description: Version of Rokit to install.
    required: false
    default: v1.2.0
  github-token:
    description: Token used for GitHub API calls when no GitHub App credentials are supplied.
    required: false
    default: ${{ github.token }}
  app-id:
    description: Optional GitHub App client/app ID used to mint a token for publish and PR pushes.
    required: false
    default: ""
  private-key:
    description: Optional GitHub App private key used with app-id.
    required: false
    default: ""
  bump:
    description: Which semver component to bump when preparing the next release PR (major, minor, patch).
    required: false
    default: minor
  publish-immediately:
    description: Publish the drafted GitHub release immediately. Set false when downstream jobs attach artifacts first.
    required: false
    default: "true"
  force-publish:
    description: Tag and draft the configured version even if it already has a tag.
    required: false
    default: "false"
  base:
    description: Base branch for the generated publish PR.
    required: false
    default: main
  branch:
    description: Branch name for the generated publish PR.
    required: false
    default: publish-next-version

outputs:
  should_publish:
    description: Whether this run drafted a release for the configured version.
    value: ${{ steps.result.outputs.should_publish }}
  has_changes:
    description: Whether there are unreleased commits since the current version tag.
    value: ${{ steps.result.outputs.has_changes }}
  version:
    description: The release version acted on by this run.
    value: ${{ steps.result.outputs.version }}
  tag:
    description: The release tag for the version output.
    value: ${{ steps.result.outputs.tag }}
  draft_created:
    description: Whether a draft release was created or confirmed.
    value: ${{ steps.result.outputs.draft_created }}
  release_created:
    description: Whether a GitHub release was published.
    value: ${{ steps.result.outputs.release_created }}

runs:
  using: composite
  steps:
    - name: Install Rokit
      uses: CompeyDev/setup-rokit@v0.2.1
      with:
        version: ${{ inputs.rokit-version }}
        token: ${{ inputs.github-token }}

    - name: Build changewrite CLI
      shell: bash
      run: |
        set -euo pipefail
        cd "$GITHUB_ACTION_PATH"
        lute run install
        lute run build

    - name: Generate app token
      id: app-token
      if: inputs.app-id != '' && inputs.private-key != ''
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}

    - name: Evaluate release gate
      id: gate
      shell: bash
      env:
        FORCE_PUBLISH: ${{ inputs.force-publish }}
      run: |
        set -euo pipefail

        args=(release gate)
        if [[ "$FORCE_PUBLISH" == "true" ]]; then
          args+=(--force-publish)
        fi

        result="$("$GITHUB_ACTION_PATH/build/changewrite" "${args[@]}")"
        echo "$result"

        echo "version=$(jq -r '.version' <<< "$result")" >> "$GITHUB_OUTPUT"
        echo "should_publish=$(jq -r '.should_publish' <<< "$result")" >> "$GITHUB_OUTPUT"
        echo "has_changes=$(jq -r '.has_changes' <<< "$result")" >> "$GITHUB_OUTPUT"

    - name: Draft release
      id: draft
      if: steps.gate.outputs.should_publish == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token || inputs.github-token }}
      run: |
        set -euo pipefail
        "$GITHUB_ACTION_PATH/build/changewrite" release draft --version "${{ steps.gate.outputs.version }}"
        echo "draft_created=true" >> "$GITHUB_OUTPUT"

    - name: Publish release
      id: publish
      if: steps.gate.outputs.should_publish == 'true' && inputs.publish-immediately == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token || inputs.github-token }}
      run: |
        set -euo pipefail
        "$GITHUB_ACTION_PATH/build/changewrite" release publish --tag "v${{ steps.gate.outputs.version }}"
        echo "release_created=true" >> "$GITHUB_OUTPUT"

    - name: Prepare release changes
      id: prepare
      if: steps.gate.outputs.should_publish != 'true' && steps.gate.outputs.has_changes == 'true'
      shell: bash
      env:
        BUMP: ${{ inputs.bump }}
      run: |
        set -euo pipefail
        result="$("$GITHUB_ACTION_PATH/build/changewrite" release prepare-pr --bump "$BUMP")"
        echo "$result"
        json="$(tail -n1 <<< "$result")"

        echo "version=$(jq -r '.version' <<< "$json")" >> "$GITHUB_OUTPUT"
        {
          echo 'changed_files<<__CHANGEWRITE_FILES__'
          echo 'CHANGELOG.md'
          jq -r '.changed_files[]' <<< "$json"
          echo '__CHANGEWRITE_FILES__'
        } >> "$GITHUB_OUTPUT"

    - name: Render release notes preview
      id: notes
      if: steps.prepare.outputs.version != ''
      shell: bash
      run: |
        set -euo pipefail
        {
          echo 'body<<__CHANGEWRITE_NOTES__'
          "$GITHUB_ACTION_PATH/build/changewrite" release notes --version "${{ steps.prepare.outputs.version }}"
          echo '__CHANGEWRITE_NOTES__'
        } >> "$GITHUB_OUTPUT"

    - name: Create or update publish PR
      if: steps.prepare.outputs.version != ''
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ steps.app-token.outputs.token || inputs.github-token }}
        base: ${{ inputs.base }}
        branch: ${{ inputs.branch }}
        draft: true
        commit-message: Publish v${{ steps.prepare.outputs.version }}
        title: "[AUTO-GENERATED] Publish v${{ steps.prepare.outputs.version }}"
        add-paths: |
          ${{ steps.prepare.outputs.changed_files }}
        body: |
          > [!IMPORTANT]
          > This PR prepares the next release by bumping the version and updating the changelog.

          Merging this PR will create and publish `v${{ steps.prepare.outputs.version }}`.

          ## Release Preview

          ${{ steps.notes.outputs.body }}

          Next release will be available here:
          ${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ steps.prepare.outputs.version }}

          This PR was generated by [this run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

    - name: Set action outputs
      id: result
      shell: bash
      run: |
        set -euo pipefail

        version="${{ steps.prepare.outputs.version || steps.gate.outputs.version }}"

        echo "should_publish=${{ steps.gate.outputs.should_publish }}" >> "$GITHUB_OUTPUT"
        echo "has_changes=${{ steps.gate.outputs.has_changes }}" >> "$GITHUB_OUTPUT"
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "tag=v$version" >> "$GITHUB_OUTPUT"
        echo "draft_created=${{ steps.draft.outputs.draft_created || 'false' }}" >> "$GITHUB_OUTPUT"
        echo "release_created=${{ steps.publish.outputs.release_created || 'false' }}" >> "$GITHUB_OUTPUT"
