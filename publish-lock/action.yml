name: Changewrite Publish Lock
description: >-
  Set the publish PR's lock. Lock it while a release run regenerates it so it
  cannot be merged out of date, and unlock it once it is up to date again.
author: flipbook-labs

inputs:
  github-token:
    description: >-
      Token used to post the commit status. Needs the `statuses: write`
      permission.
    required: false
    default: ${{ github.token }}
  state:
    description: >-
      `locked` to block merging the publish PR (fails its `publish-lock` status),
      or `unlocked` to allow it again (passes the status).
    required: true
  branch:
    description: >-
      Branch whose head commit the status is posted to. Ignored when `sha` is
      set. Defaults to the publish branch.
    required: false
    default: publish-next-version
  sha:
    description: Exact commit the status is posted to. Takes precedence over `branch`.
    required: false
    default: ""
  repo:
    description: Repository as owner/name the status belongs to.
    required: false
    default: ${{ github.repository }}
  url:
    description: URL the status badge links to in the GitHub UI, e.g. the release run.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Download changewrite binary
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        # A caller can pre-set CHANGEWRITE_BIN to run its own binary rather than a
        # release download. Changewrite's own CI uses this to dogfood the branch
        # build; consumers leave it unset and get the release below.
        if [[ -n "${CHANGEWRITE_BIN:-}" ]]; then
          echo "Using preset changewrite binary: $CHANGEWRITE_BIN"
          exit 0
        fi

        version="$(sed -n 's/^current = "\(.*\)"/\1/p' "$GITHUB_ACTION_PATH/../changewrite.toml")"
        if [[ -z "$version" ]]; then
          echo "Failed to parse version from changewrite.toml"
          exit 1
        fi

        case "${RUNNER_OS}/${RUNNER_ARCH}" in
          Linux/X64)   zip="changewrite-linux-x86_64.zip"  ; bin="changewrite" ;;
          macOS/ARM64) zip="changewrite-macos-arm64.zip"   ; bin="changewrite" ;;
          Windows/X64) zip="changewrite-windows-x86_64.zip"; bin="changewrite.exe" ;;
          *) echo "Unsupported platform: ${RUNNER_OS}/${RUNNER_ARCH}"; exit 1 ;;
        esac

        tmp="$(mktemp -d)"
        if ! gh release download "v${version}" \
          --repo flipbook-labs/changewrite \
          --pattern "$zip" \
          --dir "$tmp"; then
          echo "::warning::Could not download the binary for v${version}; falling back to the latest release. This is expected on the publish PR, which bumps the version before its release exists. Otherwise, check that the version in changewrite.toml has a published release."
          gh release download \
            --repo flipbook-labs/changewrite \
            --pattern "$zip" \
            --dir "$tmp"
        fi

        unzip -q "$tmp/$zip" "$bin" -d "$tmp"
        [[ "$RUNNER_OS" != "Windows" ]] && chmod +x "$tmp/$bin"

        echo "CHANGEWRITE_BIN=$tmp/$bin" >> "$GITHUB_ENV"

    - name: Set the publish lock
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        STATE: ${{ inputs.state }}
        BRANCH: ${{ inputs.branch }}
        SHA: ${{ inputs.sha }}
        REPO: ${{ inputs.repo }}
        URL: ${{ inputs.url }}
      run: |
        set -euo pipefail

        case "$STATE" in
          locked) command=lock ;;
          unlocked) command=unlock ;;
          *) echo "state must be 'locked' or 'unlocked', got '$STATE'"; exit 1 ;;
        esac

        # The CLI treats empty flags as unset (--sha wins over --branch), so
        # forward them all and let it sort out precedence and defaults.
        "$CHANGEWRITE_BIN" "$command" \
          --branch "$BRANCH" --sha "$SHA" --repo "$REPO" --url "$URL"
