name: Release

on:
  push:
    branches: [main]
  pull_request:
    types: [
        opened,
        synchronize,
        reopened,
        # We include `labeled` so that tagging the PR with `debug:release-pr`
        # will trigger a debug version of the release workflow.
        labeled,
      ]
  workflow_dispatch:
    inputs:
      force_publish:
        description: Tag and create draft release from version on `main`
        type: boolean
        default: false
      force_version:
        description: Forget the version being published and open a publish PR for this exact version instead (e.g. 1.2.3)
        type: string
        default: ""

env:
  PUBLISH_BRANCH: publish-next-version
  # The commit-status context that gates the publish PR. Add it as a required
  # status check on `main` for the lock to actually block a merge.
  PUBLISH_LOCK_CONTEXT: publish-lock
  REPO: ${{ github.repository }}
  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  lock:
    # A merge to `main` starts the run below, which regenerates the publish PR
    # to fold in the just-merged change. Fail the publish PR's lock status right
    # away so it cannot be merged (and cut a release missing that change) in the
    # window before the regeneration lands. `unlock` clears it on success.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      statuses: write
    steps:
      - name: Lock the publish PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sha="$(gh api "repos/$REPO/git/ref/heads/$PUBLISH_BRANCH" --jq .object.sha 2>/dev/null || true)"
          if [[ -z "$sha" ]]; then
            echo "No $PUBLISH_BRANCH branch yet; nothing to lock."
            exit 0
          fi
          gh api -X POST "repos/$REPO/statuses/$sha" \
            -f state=failure -f context="$PUBLISH_LOCK_CONTEXT" \
            -f target_url="$RUN_URL" \
            -f description="Release is processing a newly merged change"

  build:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'debug:release-pr')
    uses: ./.github/workflows/build.yml

  release:
    needs: build
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'debug:release-pr')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      has_changes: ${{ steps.changewrite.outputs.has_changes }}
      should_publish: ${{ steps.changewrite.outputs.should_publish }}
      version: ${{ steps.changewrite.outputs.version }}
      tag: ${{ steps.changewrite.outputs.tag }}
    concurrency:
      group: release-pr-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.FLIPBOOK_BACKEND_APP_ID }}
          private-key: ${{ secrets.FLIPBOOK_BACKEND_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          # This makes sure even on PR-triggered runs that the changelog gets
          # generated the expected way (by building it off `main`).
          ref: main

      - name: Download release assets
        if: github.event_name != 'pull_request'
        uses: actions/download-artifact@v8
        with:
          pattern: changewrite-*
          path: assets
          merge-multiple: true

      - id: changewrite
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-token: ${{ steps.app-token.outputs.token }}
          force-publish: ${{ inputs.force_publish || false }}
          force-version: ${{ inputs.force_version }}
          base: main
          branch: ${{ github.event_name == 'pull_request' && 'debug-publish-next-version' || 'publish-next-version' }}
          prepare-only: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'debug:release-pr') }}
          post-draft-hook: |
            "$CHANGEWRITE_BIN" attach --tag "$CHANGEWRITE_TAG" --files assets/*.zip
          pr-title: ${{ github.event_name == 'pull_request' && '[DEBUG] Publish v{{version}}' || 'Publish v{{version}}' }}
          pr-body: |
            >[!IMPORTANT]
            > This PR prepares the next release by bumping the version and updating the changelog.
            >
            > **Merging this PR will:**
            >
            > 1. Create tag `{{tag}}` via the GitHub API
            > 2. Create a GitHub release for that tag
            > 3. Publish the release after any configured follow-up jobs finish

            <details>
            <summary><b>GitHub Release preview</b></summary>

            # {{tag}}

            **github-actions** released this 0 seconds ago 🔒 Immutable 🏷️ {{tag}} 🔗 SHA

            {{notes}}
            </details>

            Next release will be available here:
            {{repo_url}}/releases/tag/{{tag}}

            🤖 This PR was generated by [this run]({{run_url}}).

  unlock:
    # The release run regenerated the publish PR (a new commit, so a new head
    # sha), and it now matches `main`. Clear the lock on the current head. This
    # only runs when `release` succeeds, so a broken run leaves the PR locked.
    needs: release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      statuses: write
    steps:
      - name: Unlock the publish PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sha="$(gh api "repos/$REPO/git/ref/heads/$PUBLISH_BRANCH" --jq .object.sha 2>/dev/null || true)"
          if [[ -z "$sha" ]]; then
            echo "No $PUBLISH_BRANCH branch; nothing to unlock."
            exit 0
          fi
          gh api -X POST "repos/$REPO/statuses/$sha" \
            -f state=success -f context="$PUBLISH_LOCK_CONTEXT" \
            -f target_url="$RUN_URL" \
            -f description="Release is up to date with main"

  satisfy-publish-lock:
    # `publish-lock` is required on `main` so the publish PR cannot be merged
    # mid-release, but a required check must report on every PR into `main` or
    # those PRs wait forever on a status that never arrives. Report success at
    # once for any PR that is not the publish PR. This is a few-second no-op that
    # runs alongside the real CI, so it does not gate an ordinary PR's timeline.
    if: github.event_name == 'pull_request' && github.head_ref != 'publish-next-version'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      statuses: write
    steps:
      - name: Report the publish lock satisfied
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          gh api -X POST "repos/$REPO/statuses/$HEAD_SHA" \
            -f state=success -f context="$PUBLISH_LOCK_CONTEXT" \
            -f description="Not the publish PR"
