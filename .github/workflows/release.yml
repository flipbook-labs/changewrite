name: Release

on:
  push:
    branches: [main]
  pull_request:
    types: [
        opened,
        synchronize,
        reopened,
        # We include `labeled` so that tagging the PR with `debug:release-pr`
        # will trigger a debug version of the release workflow.
        labeled,
      ]
  workflow_dispatch:
    inputs:
      force_publish:
        description: Tag and create draft release from version on `main`
        type: boolean
        default: false

jobs:
  build:
    name: build (${{ matrix.os }})
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'debug:release-pr')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    # The Windows build currently fails on a Lute-adjacent issue we still
    # need to work out. Tolerate it for now so its artifact is omitted
    # rather than blocking the release.
    continue-on-error: ${{ matrix.os == 'windows' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            runner: macos-latest
            zip_name: changewrite-macos-arm64.zip
          - os: linux
            runner: ubuntu-latest
            zip_name: changewrite-linux-x86_64.zip
          - os: windows
            runner: windows-latest
            binary: build/changewrite.exe
            zip_name: changewrite-windows-x86_64.zip
    steps:
      - uses: actions/checkout@v6

      - uses: CompeyDev/setup-rokit@v0.2.1
        with:
          version: v1.2.0

      - name: Install dependencies
        run: lute run install

      - name: Build changewrite
        run: lute run build

      - name: Package binary
        shell: bash
        run: zip -j "${{ matrix.zip_name }}" "${{ matrix.binary || 'build/changewrite' }}"

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}

  release:
    needs: build
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'debug:release-pr')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      workflows: write
    outputs:
      has_changes: ${{ steps.changewrite.outputs.has_changes }}
      should_publish: ${{ steps.changewrite.outputs.should_publish }}
      version: ${{ steps.changewrite.outputs.version }}
      tag: ${{ steps.changewrite.outputs.tag }}
    concurrency:
      group: release-pr-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.FLIPBOOK_BACKEND_APP_ID }}
          private-key: ${{ secrets.FLIPBOOK_BACKEND_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          # This makes sure even on PR-triggered runs that the changelog gets
          # generated the expected way (by building it off `main`).
          ref: main

      - name: Download release assets
        if: github.event_name != 'pull_request'
        uses: actions/download-artifact@v8
        with:
          pattern: changewrite-*
          path: assets
          merge-multiple: true

      - id: changewrite
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          app-id: ${{ secrets.FLIPBOOK_BACKEND_APP_ID }}
          private-key: ${{ secrets.FLIPBOOK_BACKEND_APP_PRIVATE_KEY }}
          force-publish: ${{ inputs.force_publish || false }}
          base: main
          branch: ${{ github.event_name == 'pull_request' && 'debug-publish-next-version' || 'publish-next-version' }}
          prepare-only: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'debug:release-pr') }}
          post-draft-hook: |
            "$CHANGEWRITE_BIN" attach --tag "$CHANGEWRITE_TAG" --files assets/*.zip
          pr-title: ${{ github.event_name == 'pull_request' && '[DEBUG] Publish v{{version}}' || 'Publish v{{version}}' }}
          pr-body: |
            >[!IMPORTANT]
            > This PR prepares the next release by bumping the version and updating the changelog.
            >
            > **Merging this PR will:**
            >
            > 1. Create and push tag `{{tag}}`
            > 2. Create a GitHub release for that tag
            > 3. Publish the release after any configured follow-up jobs finish

            <details>
            <summary><b>GitHub Release preview</b></summary>

            # {{tag}}

            **github-actions** released this 0 seconds ago 🔒 Immutable 🏷️ {{tag}} 🔗 SHA

            {{notes}}
            </details>

            Next release will be available here:
            {{repo_url}}/releases/tag/{{tag}}

            🤖 This PR was generated by [this run]({{run_url}}).
