name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    # Build every supported platform on PRs. On pushes to `main` the release
    # workflow already runs this same matrix, so we scope this to PRs to avoid
    # duplicating the matrix build.
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/build.yml

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: CompeyDev/setup-rokit@1d9390883f7ebce19d48f5b8d006e11d387c92ab # v0.2.1
        with:
          version: v1.2.0

      - name: Install dependencies
        run: lute run install

      - name: Test
        run: lute test

  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: CompeyDev/setup-rokit@1d9390883f7ebce19d48f5b8d006e11d387c92ab # v0.2.1
        with:
          version: v1.2.0

      - name: Setup Lute typedefs
        run: lute setup

      - name: Install dependencies
        run: lute run install

      - name: Analyze
        run: lute run analyze

  changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          # `require-entry` diffs against the PR base branch, so a merge-base must
          # exist. Full history guarantees it (the default depth-1 checkout does not).
          fetch-depth: 0

      - uses: ./
        with:
          require-entry: 'true'
