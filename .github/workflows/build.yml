name: Build

# Reusable build matrix shared by CI (on every PR) and the release workflow.
# Both callers package and upload the binaries as artifacts: PRs so the built
# binaries can be inspected from the run summary, and the release so it ships
# its own copies. Building them in both places is deliberate redundancy.
on:
  workflow_call:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            runner: macos-latest
            zip_name: changewrite-macos-arm64.zip
          - os: linux
            runner: ubuntu-latest
            zip_name: changewrite-linux-x86_64.zip
          - os: windows
            runner: windows-latest
            binary: build/changewrite.exe
            zip_name: changewrite-windows-x86_64.zip
    steps:
      - uses: actions/checkout@v7

      - uses: CompeyDev/setup-rokit@1d9390883f7ebce19d48f5b8d006e11d387c92ab # v0.2.1
        with:
          version: v1.2.0

      - name: Install dependencies
        run: lute run install

      - name: Build changewrite
        run: lute run build

      - name: Smoketest
        shell: bash
        run: |
          "${{ matrix.binary || 'build/changewrite' }}" --help

      # Windows runners have no `zip` in their Git Bash, so package per-OS:
      # `zip -j` and `Compress-Archive` both store the binary at the archive
      # root, keeping the layout identical across platforms.
      - name: Package binary
        if: matrix.os != 'windows'
        shell: bash
        run: zip -j "${{ matrix.zip_name }}" "${{ matrix.binary || 'build/changewrite' }}"

      - name: Package binary (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: Compress-Archive -Path "${{ matrix.binary }}" -DestinationPath "${{ matrix.zip_name }}"

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}
